<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideKit Reviewer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #333750;
    --text: #e4e6f0;
    --text2: #8b8fa8;
    --accent: #6c8aff;
    --accent-dim: #3d4f8c;
    --danger: #ff6b6b;
    --success: #51cf66;
    --warning: #ffd43b;
    --orange: #ff922b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── ヘッダー ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
  }
  .header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .header .meta-title {
    font-size: 13px; color: var(--text2); flex: 1; min-width: 80px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn {
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a7aee; }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(255,107,107,.12); }

  /* モード切替トグル */
  .mode-toggle {
    display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .mode-toggle button {
    padding: 5px 14px; border: none; background: transparent; color: var(--text2);
    font-size: 11px; cursor: pointer; transition: all .15s; font-weight: 500;
  }
  .mode-toggle button.active {
    background: var(--accent); color: #fff;
  }
  .mode-toggle button:not(.active):hover { background: var(--surface2); color: var(--text); }

  /* ── メインレイアウト ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── サイドバー ── */
  .sidebar {
    width: 230px; min-width: 230px; background: var(--surface);
    border-right: 1px solid var(--border); overflow-y: auto;
    padding: 8px; display: flex; flex-direction: column;
  }
  .sidebar-list { flex: 1; overflow-y: auto; }
  .slide-list-item {
    padding: 7px 10px; border-radius: 5px; cursor: pointer;
    font-size: 12px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
    border: 1px solid transparent; transition: all .12s;
  }
  .slide-list-item:hover { background: var(--surface2); }
  .slide-list-item.active { background: var(--accent-dim); border-color: var(--accent); }
  .slide-num { color: var(--text2); font-size: 11px; font-family: monospace; min-width: 22px; }
  .slide-type-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .slide-list-item.active .slide-type-badge { background: var(--accent); color: #fff; border-color: var(--accent); }
  .slide-img-count {
    font-size: 9px; color: var(--orange); flex-shrink: 0;
  }

  /* ── エディタ領域 ── */
  .editor-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

  .slide-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; flex: 1; display: flex; flex-direction: column;
  }
  .slide-card-header {
    padding: 8px 16px; background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0;
  }
  .slide-card-header .slide-label { font-size: 13px; font-weight: 600; }
  .slide-card-header select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 4px; font-size: 12px;
  }

  .slide-card-body { display: flex; flex: 1; min-height: 0; }

  /* 左: テキスト編集 */
  .text-panel { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid var(--border); min-height: 0; }
  .field-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; flex-shrink: 0; }
  .field-input {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 9px; font-size: 13px; font-family: inherit; resize: vertical;
  }
  .field-input:focus { outline: none; border-color: var(--accent); }
  textarea.field-input { min-height: 80px; line-height: 1.6; flex: 1; }

  /* 右: 画像パネル */
  .image-panel {
    width: 340px; min-width: 340px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
  }
  .image-slot {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; display: flex; flex-direction: column; gap: 6px; flex: 1;
  }
  .image-slot-preview {
    min-height: 120px; flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border-radius: 6px; overflow: hidden;
  }
  .image-slot-preview img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .image-slot-preview .placeholder { color: var(--text2); font-size: 11px; text-align: center; padding: 16px; }
  .image-slot-row { display: flex; gap: 6px; align-items: center; }
  .image-slot-row input {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 6px; font-size: 11px;
  }
  .image-slot-row input:focus { outline: none; border-color: var(--accent); }
  .btn-xs {
    padding: 3px 8px; font-size: 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); cursor: pointer;
  }
  .btn-xs:hover { border-color: var(--accent); color: var(--accent); }
  .btn-xs.danger { border-color: var(--danger); color: var(--danger); }
  .btn-xs.danger:hover { background: rgba(255,107,107,.1); }
  .add-image-btn {
    border: 1px dashed var(--border); border-radius: 6px; padding: 10px;
    text-align: center; color: var(--text2); font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .add-image-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── メタ情報エディタ ── */
  .meta-editor {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
  }
  .meta-editor h2 { font-size: 15px; margin-bottom: 14px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }

  /* ── ドロップゾーン ── */
  .drop-zone {
    position: fixed; inset: 0; background: rgba(108,138,255,.15);
    border: 3px dashed var(--accent); z-index: 999;
    display: none; align-items: center; justify-content: center;
    font-size: 22px; color: var(--accent); font-weight: 600;
  }
  .drop-zone.active { display: flex; }

  /* ── 操作ボタン群 ── */
  .slide-actions {
    padding: 6px 16px; background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex; gap: 6px; justify-content: flex-end; flex-shrink: 0;
  }

  /* ── 画像フォルダバナー ── */
  .image-banner {
    background: linear-gradient(90deg, #1a2333, #1e2a3a); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: none; align-items: center; gap: 14px; font-size: 12px;
  }
  .image-banner.visible { display: flex; }
  .image-banner .banner-icon { font-size: 18px; flex-shrink: 0; }
  .image-banner .banner-body { flex: 1; }
  .image-banner .banner-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
  .image-banner .banner-detail { font-size: 11px; color: var(--text2); }
  .image-banner .banner-detail .matched { color: var(--success); }
  .image-banner .banner-detail .unmatched { color: var(--warning); }
  .banner-btn {
    padding: 6px 16px; border-radius: 5px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all .15s; font-weight: 500;
  }
  .banner-btn:hover { background: var(--accent); color: #fff; }

  /* ── 初期画面 ── */
  .welcome {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; color: var(--text2);
  }
  .welcome h2 { font-size: 20px; color: var(--text); }
  .welcome p { font-size: 14px; max-width: 420px; text-align: center; line-height: 1.6; }
  .drop-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 50px 40px; text-align: center; cursor: pointer; transition: all .2s;
  }
  .drop-area:hover { border-color: var(--accent); background: rgba(108,138,255,.05); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <h1>SlideKit Reviewer</h1>
  <span class="meta-title" id="headerTitle">ファイルを読み込んでください</span>
  <div class="mode-toggle" id="modeToggle" style="display:none">
    <button class="active" onclick="setMode('plan')">構成モード</button>
    <button onclick="setMode('content')">素材モード</button>
  </div>
  <button class="btn" id="btnMeta" style="display:none" onclick="showMeta()">メタ情報</button>
  <button class="btn" id="btnAddSlide" style="display:none" onclick="addSlide()">+ スライド追加</button>
  <button class="btn btn-primary" id="btnExport" style="display:none" onclick="exportJSON()">保存</button>
  <button class="btn" onclick="document.getElementById('fileInput').click()">JSON を開く</button>
  <button class="btn" onclick="createNew()">新規作成</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<!-- 画像フォルダバナー（一括ルーティング） -->
<div class="image-banner" id="imageBanner">
  <span class="banner-icon">&#128444;</span>
  <div class="banner-body">
    <div class="banner-title" id="bannerTitle">画像フォルダを指定すると、スライド内の画像パスを一括解決します</div>
    <div class="banner-detail" id="bannerDetail">JSON 内の画像パスに対応するフォルダを選択してください</div>
  </div>
  <button class="banner-btn" onclick="document.getElementById('folderInput').click()">フォルダを選択</button>
  <input type="file" id="folderInput" webkitdirectory style="display:none">
</div>

<!-- ドロップゾーン -->
<div class="drop-zone" id="dropZone">ファイルをドロップ</div>

<!-- メイン -->
<div class="main" id="mainArea">
  <div class="welcome" id="welcomeScreen">
    <h2>SlideKit Reviewer</h2>
    <p>スライド構成の確認・編集、または新規作成ができます。</p>
    <div style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center">
      <div class="drop-area" onclick="document.getElementById('fileInput').click()" style="flex:1; min-width:200px; max-width:280px">
        <p style="font-size:28px; margin-bottom:10px">&#128196;</p>
        <p>JSON をドラッグ＆ドロップ<br>またはクリックして選択</p>
      </div>
      <div class="drop-area" onclick="createNew()" style="flex:1; min-width:200px; max-width:280px">
        <p style="font-size:28px; margin-bottom:10px">&#10133;</p>
        <p>新規作成<br>空のスライド構成を作成</p>
      </div>
    </div>
    <p style="font-size:12px; color:var(--text2); margin-top:8px">
      <b>構成モード</b> = slide_plan.json (builder用, type付き)<br>
      <b>素材モード</b> = slide_content.json (create用, typeなし)
    </p>
  </div>
</div>

<script>
// ── グローバル状態 ──
let planData = null;
let currentSlide = 0;
let showingMeta = false;
let editMode = 'plan'; // 'plan' | 'content'

// 画像キャッシュ: filename → objectURL
const imageCache = {};

const SLIDE_TYPES = [
  { value: 'title', label: 'タイトル' },
  { value: 'section-break', label: 'セクション区切り' },
  { value: 'text-only', label: 'テキストのみ' },
  { value: 'two-column', label: '2カラム' },
  { value: 'figure-focus', label: '画像メイン' },
  { value: 'data-table', label: 'テーブル' },
  { value: 'conclusion', label: '結論・謝辞' },
];

// ── ファイル読み込み ──
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.slides || !Array.isArray(data.slides)) {
        alert('slides 配列が見つかりません');
        return;
      }
      planData = data;
      if (!planData.meta) planData.meta = {};

      // mode を自動判定: type フィールドがないスライドが多ければ content モード
      const hasTypes = data.slides.some(s => s.type && s.type !== 'content');
      const detectedMode = (data.mode === 'content' || !hasTypes) ? 'content' : 'plan';

      // content モードのデータを正規化: images 配列を保証
      planData.slides.forEach(s => {
        if (!s.images) {
          // 旧形式 (image 単体) → images 配列に変換
          s.images = [];
          if (s.image) {
            s.images.push({ path: s.image, caption: s.image_caption || '' });
          }
        }
      });

      currentSlide = 0;
      showingMeta = false;
      setMode(detectedMode);
      // 画像パスがあればバナー表示
      const hasImages = data.slides.some(s =>
        (s.images && s.images.length > 0) || s.image
      );
      document.getElementById('imageBanner').className = 'image-banner' + (hasImages ? ' visible' : '');
      updateBannerStatus();
      render();
    } catch (err) {
      alert('JSON 解析エラー: ' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

// ── 画像フォルダ読み込み（一括ルーティング） ──
document.getElementById('folderInput').addEventListener('change', e => {
  const files = e.target.files;
  if (!files || files.length === 0) return;
  let count = 0;
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(f);
    const fname = f.name; // ファイル名のみ
    const relPath = (f.webkitRelativePath || f.name).replace(/\\/g, '/');

    // 複数パターンでキャッシュに登録
    imageCache[fname] = url;                         // fig_p002_01.png
    imageCache['images/' + fname] = url;             // images/fig_p002_01.png

    // webkitRelativePath 全体: "folder/images/fig.png"
    imageCache[relPath] = url;

    // webkitRelativePath からトップフォルダを除去: "images/fig.png"
    const parts = relPath.split('/');
    if (parts.length >= 2) {
      const withoutTop = parts.slice(1).join('/');
      imageCache[withoutTop] = url;                  // images/fig_p002_01.png
      // さらにサブフォルダも除去してファイル名のみ
      if (parts.length >= 3) {
        const withoutTwo = parts.slice(2).join('/');
        imageCache[withoutTwo] = url;                // fig_p002_01.png (深い場合)
      }
    }
    count++;
  }
  updateBannerStatus();
  if (planData) render();
});

// ── バナー状態更新 ──
function updateBannerStatus() {
  if (!planData) return;
  // 全スライドの画像パスを集め、解決状況をチェック
  let total = 0, matched = 0;
  const unresolved = [];
  planData.slides.forEach(s => {
    if (s.images) {
      s.images.forEach(img => {
        if (!img.path) return;
        total++;
        if (resolveImage(img.path)) matched++;
        else unresolved.push(img.path);
      });
    }
  });

  const titleEl = document.getElementById('bannerTitle');
  const detailEl = document.getElementById('bannerDetail');

  if (total === 0) {
    titleEl.textContent = '画像パスなし';
    detailEl.innerHTML = 'スライドに画像が含まれていません';
  } else if (matched === total) {
    titleEl.textContent = '画像フォルダ読み込み済み';
    detailEl.innerHTML = `<span class="matched">${matched}/${total} 画像すべて解決済み</span>`;
  } else if (matched > 0) {
    titleEl.textContent = '画像フォルダ読み込み済み（一部未解決）';
    detailEl.innerHTML = `<span class="matched">${matched} 解決</span> / <span class="unmatched">${total - matched} 未解決</span>: ${unresolved.slice(0, 3).join(', ')}${unresolved.length > 3 ? '...' : ''}`;
  } else {
    titleEl.textContent = '画像フォルダを指定してください';
    detailEl.innerHTML = `<span class="unmatched">${total} 画像が未解決</span> — JSON と同じフォルダ（images/ を含むフォルダ）を選択`;
  }
}

// ── モード切替 ──
function setMode(mode) {
  editMode = mode;
  const btns = document.querySelectorAll('#modeToggle button');
  btns[0].className = mode === 'plan' ? 'active' : '';
  btns[1].className = mode === 'content' ? 'active' : '';
  document.getElementById('modeToggle').style.display = planData ? '' : 'none';
  if (planData) render();
}

// ── ドラッグ＆ドロップ ──
let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; document.getElementById('dropZone').classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { document.getElementById('dropZone').classList.remove('active'); dragCounter = 0; } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('active');
  dragCounter = 0;
  const files = e.dataTransfer.files;
  if (!files.length) return;
  const f = files[0];
  if (f.name.endsWith('.json')) {
    loadFile(f);
  } else if (f.type.startsWith('image/') && planData) {
    addDroppedImage(files);
  }
});

function addDroppedImage(files) {
  if (showingMeta) return;
  const slide = planData.slides[currentSlide];
  if (!slide) return;
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(f);
    const fname = f.name;
    imageCache[fname] = url;
    imageCache['images/' + fname] = url;
    slide.images.push({ path: 'images/' + fname, caption: '' });
    if (editMode === 'plan' && slide.type === 'text-only') {
      slide.type = 'two-column';
      slide.image = 'images/' + fname;
      slide.image_caption = '';
    }
  }
  updateBannerStatus();
  render();
}

// ── 画像解決（個別ルーティング済み or フォルダ一括のどちらでも解決） ──
function resolveImage(path) {
  if (!path) return null;
  const p = path.replace(/\\/g, '/');

  // 完全一致
  if (imageCache[p]) return imageCache[p];

  // ファイル名のみで検索
  const fname = p.split('/').pop();
  if (imageCache[fname]) return imageCache[fname];

  // images/fname
  if (imageCache['images/' + fname]) return imageCache['images/' + fname];

  // パス末尾2セグメントで検索 (images/fig.png)
  const segments = p.split('/');
  if (segments.length >= 2) {
    const tail2 = segments.slice(-2).join('/');
    if (imageCache[tail2]) return imageCache[tail2];
  }

  // キャッシュ全キーからファイル名末尾一致で検索（最終手段）
  for (const key of Object.keys(imageCache)) {
    if (key.endsWith('/' + fname) || key === fname) {
      return imageCache[key];
    }
  }

  return null;
}

// ── レンダリング ──
function render() {
  if (!planData) return;

  document.getElementById('headerTitle').textContent = planData.meta.title || '(無題)';
  document.getElementById('btnMeta').style.display = '';
  document.getElementById('btnAddSlide').style.display = '';
  document.getElementById('btnExport').style.display = '';
  document.getElementById('modeToggle').style.display = '';

  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // サイドバー
  const sidebar = document.createElement('div');
  sidebar.className = 'sidebar';
  let listHtml = '';
  planData.slides.forEach((s, i) => {
    const active = (!showingMeta && i === currentSlide) ? ' active' : '';
    const heading = s.heading || (editMode === 'plan' ? getTypeLabel(s.type) : '(見出しなし)');
    const short = heading.length > 14 ? heading.slice(0, 14) + '..' : heading;
    const imgCount = (s.images && s.images.length > 0) ? `<span class="slide-img-count">[${s.images.length}img]</span>` : '';
    const badge = editMode === 'plan' ? `<span class="slide-type-badge">${escH(getTypeLabel(s.type || 'text-only'))}</span>` : '';
    listHtml += `<div class="slide-list-item${active}" onclick="selectSlide(${i})" title="${escH(heading)}">
      <span class="slide-num">${String(i + 1).padStart(2, '0')}</span>
      <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${escH(short)}</span>
      ${imgCount}${badge}
    </div>`;
  });
  sidebar.innerHTML = `<div class="sidebar-list">${listHtml}</div>`;
  main.appendChild(sidebar);

  // エディタ
  const editor = document.createElement('div');
  editor.className = 'editor-area';
  editor.innerHTML = showingMeta ? renderMetaEditor() :
    (editMode === 'plan' ? renderPlanSlide(currentSlide) : renderContentSlide(currentSlide));
  main.appendChild(editor);
}

// ── メタ情報エディタ ──
function renderMetaEditor() {
  const m = planData.meta;
  return `<div class="meta-editor">
    <h2>メタ情報</h2>
    <div class="meta-grid">
      ${metaField('タイトル', 'title', m.title)}
      ${metaField('サブタイトル', 'subtitle', m.subtitle)}
      ${metaField('著者', 'authors', m.authors)}
      ${metaField('所属', 'affiliation', m.affiliation)}
      ${metaField('テーマ', 'theme', m.theme)}
      ${metaField('日付', 'date', m.date)}
      ${metaField('プレゼンタイプ', 'presentation_type', m.presentation_type)}
      <div class="meta-field">
        <span class="field-label">言語</span>
        <select class="field-input" onchange="planData.meta.language=this.value">
          <option value="ja" ${m.language === 'ja' ? 'selected' : ''}>日本語</option>
          <option value="en" ${m.language === 'en' ? 'selected' : ''}>English</option>
        </select>
      </div>
    </div>
  </div>`;
}
function metaField(label, key, val) {
  return `<div class="meta-field">
    <span class="field-label">${label}</span>
    <input class="field-input" value="${escA(val || '')}" onchange="planData.meta['${key}']=this.value; if('${key}'==='title') document.getElementById('headerTitle').textContent=this.value">
  </div>`;
}

// ── 構成モード: スライドエディタ ──
function renderPlanSlide(idx) {
  const s = planData.slides[idx];
  if (!s) return '';
  const typeOpts = SLIDE_TYPES.map(t => `<option value="${t.value}" ${s.type === t.value ? 'selected' : ''}>${t.label}</option>`).join('');
  const isMinimal = ['title', 'conclusion'].includes(s.type);
  const hasImage = ['two-column', 'figure-focus'].includes(s.type);
  const hasTable = s.type === 'data-table';

  let text = '';
  if (isMinimal) {
    text = `<div class="text-panel"><p style="color:var(--text2);font-size:13px;margin:auto">メタ情報から自動生成<br><button class="btn" style="margin-top:10px" onclick="showMeta()">メタ情報を編集</button></p></div>`;
  } else {
    let fields = `<div><span class="field-label">見出し</span>
      <input class="field-input" value="${escA(s.heading || '')}" oninput="planData.slides[${idx}].heading=this.value"></div>`;
    if (s.type !== 'section-break') {
      fields += `<div style="flex:1;display:flex;flex-direction:column"><span class="field-label">本文</span>
        <textarea class="field-input" style="flex:1" oninput="planData.slides[${idx}].body=this.value">${escH(s.body || '')}</textarea></div>`;
    }
    if (hasTable) {
      fields += `<div style="flex:1;display:flex;flex-direction:column"><span class="field-label">テーブル HTML</span>
        <textarea class="field-input" style="flex:1;font-family:monospace;font-size:11px" oninput="planData.slides[${idx}].table_html=this.value">${escH(s.table_html || '')}</textarea></div>
        <div><span class="field-label">テーブルキャプション</span>
        <input class="field-input" value="${escA(s.table_caption || '')}" oninput="planData.slides[${idx}].table_caption=this.value"></div>`;
    }
    text = `<div class="text-panel">${fields}</div>`;
  }

  // 画像パネル（plan モードでは1枚 or 追加ボタン）
  let imgPanel = '';
  if (hasImage) {
    const firstImg = (s.images && s.images.length > 0) ? s.images[0] : null;
    const imgSrc = firstImg ? resolveImage(firstImg.path) : null;
    const imgEl = imgSrc
      ? `<img src="${escA(imgSrc)}" alt="preview">`
      : (firstImg ? `<div class="placeholder">画像フォルダを指定してください<br><small>${escH(firstImg.path)}</small></div>`
        : `<div class="placeholder">画像をドラッグ＆ドロップ</div>`);
    imgPanel = `<div class="image-panel">
      <span class="field-label">画像</span>
      <div class="image-slot">
        <div class="image-slot-preview">${imgEl}</div>
        <div class="image-slot-row">
          <input value="${escA(firstImg ? firstImg.path : '')}" placeholder="images/..." oninput="updatePlanImage(${idx}, 'path', this.value)">
          <button class="btn-xs" onclick="pickImageFor(${idx}, 0)">選択</button>
          <button class="btn-xs danger" onclick="removePlanImage(${idx})">削除</button>
        </div>
        <div class="image-slot-row">
          <input value="${escA(firstImg ? firstImg.caption : '')}" placeholder="キャプション" oninput="updatePlanImage(${idx}, 'caption', this.value)">
        </div>
      </div>
      <input type="file" id="imgPick_${idx}_0" accept="image/*" style="display:none" data-slide="${idx}" onchange="handleImagePickUnified(this)">
    </div>`;
  } else if (!isMinimal) {
    imgPanel = `<div class="image-panel" style="align-items:center;justify-content:center">
      <div class="add-image-btn" onclick="convertPlanToImage(${idx})">+ 画像を追加して<br>2カラムに変更</div>
    </div>`;
  }

  return `<div class="slide-card">
    <div class="slide-card-header">
      <span class="slide-label">スライド ${idx + 1} / ${planData.slides.length}</span>
      <select onchange="changeType(${idx}, this.value)">${typeOpts}</select>
    </div>
    <div class="slide-card-body">${text}${imgPanel}</div>
    ${slideActions(idx)}
  </div>`;
}

// ── 素材モード: スライドエディタ ──
function renderContentSlide(idx) {
  const s = planData.slides[idx];
  if (!s) return '';

  // テキストパネル
  const text = `<div class="text-panel">
    <div><span class="field-label">見出し</span>
      <input class="field-input" value="${escA(s.heading || '')}" oninput="planData.slides[${idx}].heading=this.value"></div>
    <div style="flex:1;display:flex;flex-direction:column"><span class="field-label">本文</span>
      <textarea class="field-input" style="flex:1" oninput="planData.slides[${idx}].body=this.value">${escH(s.body || '')}</textarea></div>
  </div>`;

  // 画像パネル（複数画像対応）
  let imgSlots = '';
  if (s.images && s.images.length > 0) {
    s.images.forEach((img, j) => {
      const src = resolveImage(img.path);
      const preview = src
        ? `<img src="${escA(src)}" alt="preview">`
        : `<div class="placeholder">${escH(img.path || '画像フォルダを指定')}</div>`;
      imgSlots += `<div class="image-slot">
        <div class="image-slot-preview">${preview}</div>
        <div class="image-slot-row">
          <input value="${escA(img.path || '')}" placeholder="images/..." oninput="planData.slides[${idx}].images[${j}].path=this.value">
          <button class="btn-xs" onclick="pickImageFor(${idx}, ${j})">選択</button>
          <button class="btn-xs danger" onclick="removeContentImage(${idx}, ${j})">x</button>
        </div>
        <div class="image-slot-row">
          <input value="${escA(img.caption || '')}" placeholder="キャプション" oninput="planData.slides[${idx}].images[${j}].caption=this.value">
        </div>
      </div>`;
    });
  }
  imgSlots += `<div class="add-image-btn" onclick="pickImageFor(${idx}, -1)">+ 画像を追加</div>`;

  const imgPanel = `<div class="image-panel">
    <span class="field-label">画像素材 (${s.images ? s.images.length : 0})</span>
    ${imgSlots}
  </div>`;

  // 隠しファイルinput（各スライドに1つ、indexは data属性で管理）
  const hiddenInputs = `<input type="file" id="imgPick_${idx}" accept="image/*" style="display:none" data-slide="${idx}" onchange="handleImagePickUnified(this)">`;

  return `<div class="slide-card">
    <div class="slide-card-header">
      <span class="slide-label">スライド ${idx + 1} / ${planData.slides.length}</span>
      <span style="font-size:11px; color:var(--text2)">素材モード: レイアウトはAIが決定</span>
    </div>
    <div class="slide-card-body">${text}${imgPanel}</div>
    ${slideActions(idx)}
    ${hiddenInputs}
  </div>`;
}

function slideActions(idx) {
  return `<div class="slide-actions">
    <button class="btn" onclick="moveSlide(${idx},-1)" ${idx === 0 ? 'disabled' : ''}>&#8593; 上へ</button>
    <button class="btn" onclick="moveSlide(${idx},1)" ${idx >= planData.slides.length - 1 ? 'disabled' : ''}>&#8595; 下へ</button>
    <button class="btn" onclick="duplicateSlide(${idx})">複製</button>
    <button class="btn btn-danger" onclick="deleteSlide(${idx})">削除</button>
  </div>`;
}

// ── 操作 ──
function selectSlide(idx) { currentSlide = idx; showingMeta = false; render(); }
function showMeta() { showingMeta = true; render(); }
function changeType(idx, t) { planData.slides[idx].type = t; render(); }

function moveSlide(idx, dir) {
  const t = idx + dir;
  if (t < 0 || t >= planData.slides.length) return;
  [planData.slides[idx], planData.slides[t]] = [planData.slides[t], planData.slides[idx]];
  currentSlide = t;
  render();
}

function duplicateSlide(idx) {
  planData.slides.splice(idx + 1, 0, JSON.parse(JSON.stringify(planData.slides[idx])));
  currentSlide = idx + 1;
  render();
}

function deleteSlide(idx) {
  if (planData.slides.length <= 1) return;
  if (!confirm('スライド ' + (idx + 1) + ' を削除しますか？')) return;
  planData.slides.splice(idx, 1);
  if (currentSlide >= planData.slides.length) currentSlide = planData.slides.length - 1;
  render();
}

function createNew() {
  planData = {
    meta: {
      title: '', authors: '', affiliation: '',
      subtitle: '', theme: 'academic-blue', date: '',
      presentation_type: 'basic-research', language: 'ja'
    },
    slides: [
      { heading: '', body: '', images: [] }
    ]
  };
  currentSlide = 0;
  showingMeta = true;
  setMode('content');
  document.getElementById('imageBanner').className = 'image-banner';
  render();
}

function addSlide() {
  const s = editMode === 'plan'
    ? { type: 'text-only', heading: '', body: '', images: [] }
    : { heading: '', body: '', images: [] };
  planData.slides.splice(currentSlide + 1, 0, s);
  currentSlide++;
  render();
}

// ── 画像操作 (plan モード) ──
function updatePlanImage(idx, field, val) {
  const s = planData.slides[idx];
  if (!s.images || s.images.length === 0) s.images = [{ path: '', caption: '' }];
  s.images[0][field] = val;
  // 旧形式フィールドも同期
  s.image = s.images[0].path;
  s.image_caption = s.images[0].caption;
}

function removePlanImage(idx) {
  const s = planData.slides[idx];
  s.images = [];
  s.image = ''; s.image_caption = '';
  s.type = 'text-only';
  render();
}

function convertPlanToImage(idx) {
  planData.slides[idx].type = 'two-column';
  planData.slides[idx].images = [{ path: '', caption: '' }];
  planData.slides[idx].image = '';
  planData.slides[idx].image_caption = '';
  render();
}

// ── 画像の個別ルーティング（統一ハンドラ） ──
let pendingImageSlotIdx = -1; // -1 = 新規追加

function pickImageFor(slideIdx, imgIdx) {
  pendingImageSlotIdx = imgIdx;
  // plan モードでは imgPick_X_0、content モードでは imgPick_X
  let input = document.getElementById('imgPick_' + slideIdx + '_0');
  if (!input) input = document.getElementById('imgPick_' + slideIdx);
  if (input) { input.value = ''; input.click(); }
}

function handleImagePickUnified(input) {
  const files = input.files;
  if (!files || !files.length) return;
  const slideIdx = parseInt(input.dataset.slide);
  const f = files[0];
  const url = URL.createObjectURL(f);
  const imgPath = 'images/' + f.name;

  // キャッシュに登録
  imageCache[f.name] = url;
  imageCache[imgPath] = url;

  const s = planData.slides[slideIdx];
  if (!s.images) s.images = [];
  const imgObj = { path: imgPath, caption: '' };

  if (pendingImageSlotIdx >= 0 && pendingImageSlotIdx < s.images.length) {
    s.images[pendingImageSlotIdx] = imgObj;
  } else {
    s.images.push(imgObj);
  }

  // plan モード: 旧形式フィールドも同期
  if (editMode === 'plan') {
    s.image = s.images[0].path;
    s.image_caption = s.images[0].caption;
    if (s.type === 'text-only') s.type = 'two-column';
  }

  pendingImageSlotIdx = -1;
  updateBannerStatus();
  render();
}

function removeContentImage(slideIdx, imgIdx) {
  planData.slides[slideIdx].images.splice(imgIdx, 1);
  render();
}

// ── エクスポート ──
function exportJSON() {
  if (!planData) return;
  const clean = JSON.parse(JSON.stringify(planData));

  if (editMode === 'content') {
    // 素材モード: type を除去、images 配列のみ残す
    clean.mode = 'content';
    clean.slides.forEach(s => {
      delete s.type;
      delete s.image;
      delete s.image_caption;
      delete s._imageDataUrl;
      // images 配列はそのまま
    });
    download(clean, 'slide_content.json');
  } else {
    // 構成モード: 旧形式互換 (image/image_caption) を維持
    clean.mode = 'plan';
    clean.slides.forEach(s => {
      delete s._imageDataUrl;
      // images[0] → image/image_caption に同期
      if (s.images && s.images.length > 0) {
        s.image = s.images[0].path;
        s.image_caption = s.images[0].caption;
      }
      delete s.images; // builder は images 配列を知らないので除去
    });
    download(clean, 'slide_plan.json');
  }
}

function download(obj, filename) {
  const json = JSON.stringify(obj, null, 2);
  const blob = new Blob([json], { type: 'application/json; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── ユーティリティ ──
function getTypeLabel(t) { return (SLIDE_TYPES.find(x => x.value === t) || {}).label || t || '?'; }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── キーボード ──
document.addEventListener('keydown', e => {
  if (!planData || showingMeta) return;
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); if (currentSlide > 0) { currentSlide--; render(); } }
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); if (currentSlide < planData.slides.length - 1) { currentSlide++; render(); } }
  else if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); exportJSON(); }
});
</script>
