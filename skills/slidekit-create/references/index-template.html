<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* -- Deck container (always 1280x720, scaled to fit viewport) -- */
    .deck {
      width: 1280px;
      height: 720px;
      position: relative;
      flex-shrink: 0;
      transform-origin: center center;
    }

    /* -- Slide frames (each holds an iframe) -- */
    .slide-frame {
      position: absolute;
      inset: 0;
      display: none;
      border: none;
    }
    .slide-frame.is-active { display: block; }
    .slide-frame iframe {
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
    }

    /* -- Nav UI (fixed overlay) -- */
    .slide-ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    .slide-counter {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: .7rem;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      color: rgba(255,255,255,.25);
      letter-spacing: .08em;
    }

    .slide-nav {
      position: absolute;
      bottom: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: .375rem;
      pointer-events: all;
    }

    .slide-nav button {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.5);
      padding: .35rem .9rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: .7rem;
      letter-spacing: .06em;
      transition: background .12s, color .12s;
    }
    .slide-nav button:hover {
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9);
    }

    /* -- Print / PDF (338.67mm x 190.5mm = 1280x720px at 96dpi, no scaling needed) -- */
    @page {
      size: 338.67mm 190.5mm;
      margin: 0;
    }

    @media print {
      * { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }

      html, body {
        width: 338.67mm;
        height: auto;
        display: block;
        background: #fff;
        overflow: visible;
      }

      .deck {
        transform: none !important;
        position: static;
        width: 338.67mm;
        height: auto;
        display: block;
      }

      .slide-frame {
        position: static !important;
        display: block !important;
        width: 338.67mm;
        height: 190.5mm;
        page-break-after: always;
        page-break-inside: avoid;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }
      .slide-frame iframe {
        width: 1280px;
        height: 720px;
        border: none;
      }

      .slide-ui { display: none !important; }
    }
  </style>
</head>
<body>

<div class="deck">
  <!-- {{SLIDES}} -->
</div>

<!-- Nav UI -->
<div class="slide-ui">
  <div class="slide-counter">01 / 01</div>
  <div class="slide-nav">
    <button id="btn-prev">&larr; Prev</button>
    <button id="btn-next">Next &rarr;</button>
    <button id="btn-pdf" title="PDF">PDF</button>
    <button id="btn-fs" title="Fullscreen (F)">&#x26F6;</button>
    <button id="btn-presenter" title="発表者モード (P)">&#127908;</button>
  </div>
</div>

<script>
(() => {
  const frames = () => [...document.querySelectorAll('.slide-frame')];
  let cur = 0;

  // BroadcastChannel for presenter sync
  const channel = new BroadcastChannel('slidekit-presenter');
  let isRemoteUpdate = false;

  function broadcastSlide() {
    channel.postMessage({ type: 'slideChanged', index: cur, total: frames().length });
  }

  channel.onmessage = (e) => {
    if (e.data.type === 'slideChanged') {
      isRemoteUpdate = true;
      show(e.data.index);
      isRemoteUpdate = false;
    }
  };

  function show(n) {
    const all = frames();
    if (!all.length) return;
    cur = Math.max(0, Math.min(n, all.length - 1));
    all.forEach((f, i) => f.classList.toggle('is-active', i === cur));
    const el = document.querySelector('.slide-counter');
    if (el) el.textContent =
      `${String(cur + 1).padStart(2, '0')} / ${String(all.length).padStart(2, '0')}`;
    if (!isRemoteUpdate) broadcastSlide();
  }

  const next = () => show(cur + 1);
  const prev = () => show(cur - 1);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) { e.preventDefault(); next(); }
    if (['ArrowLeft', 'ArrowUp'].includes(e.key))         { e.preventDefault(); prev(); }
    if (e.key === 'f' || e.key === 'F')                   { toggleFullscreen(); }
    if (e.key === 'p' || e.key === 'P')                   { openPresenter(); }
  });

  // Click on deck area (excluding nav UI)
  document.querySelector('.deck')?.addEventListener('click', e => {
    if (e.target.closest('.slide-ui')) return;
    next();
  });

  // Nav buttons
  document.getElementById('btn-prev')?.addEventListener('click', prev);
  document.getElementById('btn-next')?.addEventListener('click', next);
  document.getElementById('btn-fs')?.addEventListener('click', toggleFullscreen);
  document.getElementById('btn-pdf')?.addEventListener('click', exportPDF);
  document.getElementById('btn-presenter')?.addEventListener('click', openPresenter);

  // Open presenter view
  function openPresenter() {
    window.open('presenter.html', 'slidekit-presenter', 'width=1200,height=800');
  }

  // Fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // PDF export
  function exportPDF() {
    const params = new URLSearchParams(window.location.search);
    const scale = parseFloat(params.get('print-scale')) || 100;
    if (scale !== 100) {
      const factor = scale / 100;
      const style = document.createElement('style');
      style.id = 'print-scale-override';
      style.textContent = `
        @media print {
          @page { size: ${338.67 * factor}mm ${190.5 * factor}mm; }
          .slide-frame { transform: scale(${factor}); transform-origin: top left; }
        }
      `;
      document.head.appendChild(style);
      requestAnimationFrame(() => {
        window.print();
        document.getElementById('print-scale-override')?.remove();
      });
    } else {
      window.print();
    }
  }

  // Viewport scaling
  function scaleDeck() {
    const deck = document.querySelector('.deck');
    if (!deck) return;
    const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    deck.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', scaleDeck);
  scaleDeck();
  show(0);
})();
</script>
</body>
</html>
