<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideKit Notes Editor</title>
<style>
  /* ── デザイントークン (slide_reviewer.html と統一) ── */
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #333750;
    --text: #e4e6f0;
    --text2: #8b8fa8;
    --accent: #6c8aff;
    --accent-dim: #3d4f8c;
    --danger: #ff6b6b;
    --success: #51cf66;
    --warning: #ffd43b;
    --orange: #ff922b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── ヘッダー ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
  }
  .header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .header .meta-title {
    font-size: 13px; color: var(--text2); flex: 1; min-width: 80px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .total-time {
    font-size: 12px; color: var(--orange); white-space: nowrap; font-weight: 500;
  }
  .btn {
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a7aee; }
  .btn-ai { background: transparent; border-color: var(--orange); color: var(--orange); }
  .btn-ai:hover { background: rgba(255,146,43,.12); }

  /* ── メインレイアウト ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── サイドバー ── */
  .sidebar {
    width: 230px; min-width: 230px; background: var(--surface);
    border-right: 1px solid var(--border); overflow-y: auto;
    padding: 8px; display: flex; flex-direction: column;
  }
  .sidebar-list { flex: 1; overflow-y: auto; }
  .slide-list-item {
    padding: 7px 10px; border-radius: 5px; cursor: pointer;
    font-size: 12px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
    border: 1px solid transparent; transition: all .12s;
  }
  .slide-list-item:hover { background: var(--surface2); }
  .slide-list-item.active { background: var(--accent-dim); border-color: var(--accent); }
  .slide-num { color: var(--text2); font-size: 11px; font-family: monospace; min-width: 22px; }
  .slide-type-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .slide-list-item.active .slide-type-badge { background: var(--accent); color: #fff; border-color: var(--accent); }
  .notes-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    flex-shrink: 0; display: none;
  }
  .notes-dot.has-notes { display: block; }

  /* ── エディタ領域 ── */
  .editor-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }

  .slide-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; flex: 1; display: flex; flex-direction: column;
  }
  .slide-card-header {
    padding: 8px 16px; background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0;
  }
  .slide-card-header .slide-label { font-size: 13px; font-weight: 600; }
  .slide-card-header .slide-type-badge-lg {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface); color: var(--text2); border: 1px solid var(--border);
  }
  .slide-card-header .slide-heading-preview {
    font-size: 12px; color: var(--text2); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .slide-card-body { display: flex; flex: 1; min-height: 0; }

  /* ── 左: スライドプレビュー ── */
  .preview-panel {
    flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px;
    border-right: 1px solid var(--border); min-height: 0;
  }
  .field-label {
    font-size: 11px; color: var(--text2); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 2px; flex-shrink: 0;
  }
  .preview-frame-wrapper {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; display: flex; align-items: center;
    justify-content: center; position: relative; min-height: 200px;
  }
  .preview-iframe {
    width: 960px; height: 540px;
    transform-origin: top left;
    border: none; background: #fff;
    position: absolute; top: 0; left: 0;
  }
  .preview-text {
    padding: 24px; text-align: left; width: 100%; height: 100%;
    overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
  }
  .preview-text .preview-heading {
    font-size: 18px; font-weight: 700; color: var(--text);
    border-bottom: 2px solid var(--accent); padding-bottom: 8px;
  }
  .preview-text .preview-body {
    font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap;
  }
  .preview-text .preview-meta-info {
    font-size: 14px; color: var(--text2); text-align: center;
    margin: auto; padding: 20px;
  }

  /* ── 右: ノートエディタ ── */
  .notes-panel {
    flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px;
    min-height: 0;
  }
  .notes-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .notes-textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    resize: none; line-height: 1.8; flex: 1; min-height: 120px;
  }
  .notes-textarea:focus { outline: none; border-color: var(--accent); }
  .notes-textarea::placeholder { color: var(--text2); opacity: .6; }

  /* ── ステータスバー ── */
  .status-bar {
    padding: 6px 16px; background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    font-size: 12px; color: var(--text2);
  }
  .status-bar .stat-item { display: flex; align-items: center; gap: 4px; }
  .status-bar .stat-value { color: var(--text); font-weight: 500; }
  .status-bar .time-warn { color: var(--warning); }
  .status-bar .time-ok { color: var(--success); }

  /* ── ドロップゾーン ── */
  .drop-zone {
    position: fixed; inset: 0; background: rgba(108,138,255,.15);
    border: 3px dashed var(--accent); z-index: 999;
    display: none; align-items: center; justify-content: center;
    font-size: 22px; color: var(--accent); font-weight: 600;
  }
  .drop-zone.active { display: flex; }

  /* ── 初期画面 ── */
  .welcome {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; color: var(--text2);
  }
  .welcome h2 { font-size: 20px; color: var(--text); }
  .welcome p { font-size: 14px; max-width: 420px; text-align: center; line-height: 1.6; }
  .drop-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 50px 40px; text-align: center; cursor: pointer; transition: all .2s;
  }
  .drop-area:hover { border-color: var(--accent); background: rgba(108,138,255,.05); }

  /* ── フォルダパスバナー ── */
  .folder-banner {
    background: linear-gradient(90deg, #1a2333, #1e2a3a); border-bottom: 1px solid var(--border);
    padding: 8px 20px; display: none; align-items: center; gap: 14px; font-size: 12px;
  }
  .folder-banner.visible { display: flex; }
  .folder-banner .banner-icon { font-size: 16px; flex-shrink: 0; }
  .folder-banner .banner-body { flex: 1; display: flex; align-items: center; gap: 10px; }
  .folder-banner .banner-label { font-weight: 600; font-size: 12px; white-space: nowrap; }
  .folder-banner .banner-path {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px; font-size: 11px; font-family: monospace;
  }
  .folder-banner .banner-path:focus { outline: none; border-color: var(--accent); }
  .folder-banner .banner-status { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .folder-banner .banner-status .matched { color: var(--success); }
  .banner-btn {
    padding: 5px 14px; border-radius: 5px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); font-size: 12px;
    cursor: pointer; white-space: nowrap; transition: all .15s; font-weight: 500;
  }
  .banner-btn:hover { background: var(--accent); color: #fff; }

  /* ── コピー完了トースト ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: var(--surface2); border: 1px solid var(--success); color: var(--success);
    padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateY(10px); transition: all .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── スクロールバースタイリング ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <h1>SlideKit Notes Editor</h1>
  <span class="meta-title" id="headerTitle">ファイルを読み込んでください</span>
  <span class="total-time" id="totalTime"></span>
  <button class="btn" id="btnFolder" style="display:none" onclick="toggleFolderBanner()">&#128194; フォルダ指定</button>
  <button class="btn btn-primary" id="btnExport" style="display:none" onclick="exportJSON()">保存</button>
  <button class="btn" onclick="document.getElementById('fileInput').click()">JSON を開く</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<!-- スライドHTMLフォルダ選択バナー -->
<div class="folder-banner" id="folderBanner">
  <span class="banner-icon">&#128194;</span>
  <div class="banner-body">
    <span class="banner-label">出力フォルダ:</span>
    <input class="banner-path" id="folderPath" placeholder="スライドHTMLがあるフォルダパスを入力..."
           oninput="updateFolderPath(this.value)">
    <span class="banner-status" id="folderStatus"></span>
  </div>
  <button class="banner-btn" onclick="document.getElementById('htmlFolderInput').click()">フォルダを選択</button>
  <input type="file" id="htmlFolderInput" webkitdirectory style="display:none">
</div>

<!-- ドロップゾーン -->
<div class="drop-zone" id="dropZone">slide_plan.json をドロップ</div>

<!-- コピー完了トースト -->
<div class="toast" id="toast">クリップボードにコピーしました</div>

<!-- メイン -->
<div class="main" id="mainArea">
  <div class="welcome" id="welcomeScreen">
    <h2>SlideKit Notes Editor</h2>
    <p>slide_plan.json を読み込んで、各スライドの発表ノート（台本）を編集できます。</p>
    <div class="drop-area" onclick="document.getElementById('fileInput').click()">
      <p style="font-size:28px; margin-bottom:10px">&#128196;</p>
      <p>slide_plan.json をドラッグ＆ドロップ<br>またはクリックして選択</p>
    </div>
    <p style="font-size:12px; color:var(--text2); margin-top:8px">
      各スライドの <code style="background:var(--surface2);padding:2px 6px;border-radius:3px">notes</code> フィールドを作成・編集します
    </p>
  </div>
</div>

<script>
// ── グローバル状態 ──
let planData = null;       // 読み込んだJSONデータ
let currentSlide = 0;      // 現在選択中のスライドインデックス
let basePath = '';         // スライドHTMLの基準パス

// HTMLファイルキャッシュ: ファイル名 → objectURL
const htmlCache = {};

// スライドタイプの定義（slide_reviewer.html と統一）
const SLIDE_TYPES = [
  { value: 'title', label: 'タイトル' },
  { value: 'section-break', label: 'セクション区切り' },
  { value: 'text-only', label: 'テキストのみ' },
  { value: 'two-column', label: '2カラム' },
  { value: 'figure-focus', label: '画像メイン' },
  { value: 'data-table', label: 'テーブル' },
  { value: 'conclusion', label: '結論・謝辞' },
];

// 日本語の読み上げ速度: 約400文字/分
const CHARS_PER_MIN = 400;

// ── ファイル読み込み ──
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.slides || !Array.isArray(data.slides)) {
        alert('slides 配列が見つかりません');
        return;
      }
      planData = data;
      if (!planData.meta) planData.meta = {};

      // notes フィールドが無いスライドには空文字列をセット
      planData.slides.forEach(s => {
        if (typeof s.notes !== 'string') s.notes = '';
      });

      currentSlide = 0;
      document.getElementById('btnExport').style.display = '';
      document.getElementById('btnFolder').style.display = '';
      render();
    } catch (err) {
      alert('JSON 解析エラー: ' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

// ── HTMLフォルダ読み込み（webkitdirectory経由） ──
document.getElementById('htmlFolderInput').addEventListener('change', e => {
  const files = e.target.files;
  if (!files || files.length === 0) return;
  let count = 0;
  for (const f of files) {
    // .html ファイルのみ対象
    if (!f.name.endsWith('.html')) continue;
    // 古い ObjectURL があれば解放してメモリリークを防ぐ
    if (htmlCache[f.name]) URL.revokeObjectURL(htmlCache[f.name]);
    const url = URL.createObjectURL(f);
    htmlCache[f.name] = url;
    count++;
  }
  updateFolderStatus(count);
  if (planData) render();
});

// ── フォルダパス関連 ──
function toggleFolderBanner() {
  const banner = document.getElementById('folderBanner');
  banner.classList.toggle('visible');
}

function updateFolderPath(path) {
  basePath = path.replace(/\\/g, '/').replace(/\/$/, '');
}

function updateFolderStatus(count) {
  const statusEl = document.getElementById('folderStatus');
  if (count > 0) {
    statusEl.innerHTML = '<span class="matched">' + count + ' 個のHTMLファイルを読み込みました</span>';
  } else {
    statusEl.textContent = 'HTMLファイルが見つかりません';
  }
}

// ── スライドHTML名の生成 (001.html, 002.html ...) ──
function slideHtmlName(idx) {
  return String(idx + 1).padStart(3, '0') + '.html';
}

// ── ドラッグ＆ドロップ ──
let dragCounter = 0;
document.addEventListener('dragenter', e => {
  e.preventDefault(); dragCounter++;
  document.getElementById('dropZone').classList.add('active');
});
document.addEventListener('dragleave', e => {
  e.preventDefault(); dragCounter--;
  if (dragCounter <= 0) {
    document.getElementById('dropZone').classList.remove('active');
    dragCounter = 0;
  }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('active');
  dragCounter = 0;
  const files = e.dataTransfer.files;
  if (!files.length) return;
  const f = files[0];
  if (f.name.endsWith('.json')) {
    loadFile(f);
  }
});

// ── 読み上げ時間計算 ──
function calcSpeakingTime(text) {
  const chars = (text || '').length;
  const totalSeconds = Math.round((chars / CHARS_PER_MIN) * 60);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return { chars, minutes, seconds, totalSeconds };
}

// ── 全スライドの合計時間 ──
function calcTotalTime() {
  if (!planData) return { minutes: 0, seconds: 0, totalSeconds: 0 };
  let total = 0;
  planData.slides.forEach(s => {
    total += calcSpeakingTime(s.notes).totalSeconds;
  });
  return {
    minutes: Math.floor(total / 60),
    seconds: total % 60,
    totalSeconds: total
  };
}

// ── レンダリング ──
function render() {
  if (!planData) return;

  // ヘッダー更新
  document.getElementById('headerTitle').textContent = planData.meta.title || '(無題)';
  updateTotalTime();

  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // サイドバー
  const sidebar = document.createElement('div');
  sidebar.className = 'sidebar';
  let listHtml = '';
  planData.slides.forEach((s, i) => {
    const active = (i === currentSlide) ? ' active' : '';
    const heading = s.heading || getTypeLabel(s.type);
    const short = heading.length > 14 ? heading.slice(0, 14) + '..' : heading;
    const hasNotes = (s.notes && s.notes.trim().length > 0);
    const badge = s.type ? '<span class="slide-type-badge">' + escH(getTypeLabel(s.type)) + '</span>' : '';
    const dot = '<span class="notes-dot' + (hasNotes ? ' has-notes' : '') + '" title="' + (hasNotes ? 'ノートあり' : 'ノートなし') + '"></span>';
    listHtml += '<div class="slide-list-item' + active + '" onclick="selectSlide(' + i + ')" title="' + escH(heading) + '">'
      + '<span class="slide-num">' + String(i + 1).padStart(2, '0') + '</span>'
      + dot
      + '<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">' + escH(short) + '</span>'
      + badge
      + '</div>';
  });
  sidebar.innerHTML = '<div class="sidebar-list">' + listHtml + '</div>';
  main.appendChild(sidebar);

  // エディタ領域
  const editor = document.createElement('div');
  editor.className = 'editor-area';
  editor.innerHTML = renderSlideEditor(currentSlide);
  main.appendChild(editor);

  // テキストエリアにフォーカスイベントを設定
  const textarea = document.getElementById('notesTextarea');
  if (textarea) {
    textarea.addEventListener('input', onNotesInput);
  }

  // iframeのスケーリング処理
  requestAnimationFrame(() => scalePreviewIframe());
}

// ── スライドエディタのHTML生成 ──
function renderSlideEditor(idx) {
  const s = planData.slides[idx];
  if (!s) return '';

  const total = planData.slides.length;
  const typeBadge = s.type ? '<span class="slide-type-badge-lg">' + escH(getTypeLabel(s.type)) + '</span>' : '';
  const headingPreview = s.heading ? '<span class="slide-heading-preview">' + escH(s.heading) + '</span>' : '';

  // 左パネル: プレビュー
  const preview = renderPreview(idx, s);

  // 右パネル: ノートエディタ
  const time = calcSpeakingTime(s.notes);
  const notes = renderNotesPanel(idx, s, time);

  // ステータスバー
  const timeDisplay = formatTimeDisplay(time);
  const status = '<div class="status-bar">'
    + '<div class="stat-item">文字数: <span class="stat-value">' + time.chars + '</span></div>'
    + '<div class="stat-item">読み上げ目安: <span class="stat-value ' + (time.totalSeconds > 120 ? 'time-warn' : 'time-ok') + '">' + timeDisplay + '</span></div>'
    + '<div class="stat-item" style="color:var(--text2)">(400字/分)</div>'
    + '</div>';

  return '<div class="slide-card">'
    + '<div class="slide-card-header">'
    + '<span class="slide-label">スライド ' + (idx + 1) + ' / ' + total + '</span>'
    + typeBadge + headingPreview
    + '</div>'
    + '<div class="slide-card-body">' + preview + notes + '</div>'
    + status
    + '</div>';
}

// ── プレビューパネル ──
function renderPreview(idx, slide) {
  const htmlFileName = slideHtmlName(idx);
  const cachedUrl = htmlCache[htmlFileName];

  let previewContent = '';

  if (cachedUrl) {
    // HTMLファイルがキャッシュにある場合: iframeで表示
    previewContent = '<div class="preview-frame-wrapper" id="previewWrapper">'
      + '<iframe class="preview-iframe" id="previewIframe" src="' + escA(cachedUrl) + '" sandbox="allow-same-origin"></iframe>'
      + '</div>';
  } else {
    // フォールバック: テキストプレビュー
    previewContent = '<div class="preview-frame-wrapper">'
      + renderTextPreview(slide)
      + '</div>';
  }

  return '<div class="preview-panel">'
    + '<span class="field-label">スライドプレビュー</span>'
    + previewContent
    + '</div>';
}

// ── テキストベースプレビュー ──
function renderTextPreview(slide) {
  const isMinimal = ['title', 'conclusion'].includes(slide.type);

  if (isMinimal) {
    // タイトル/結論スライド: メタ情報表示
    const meta = planData.meta || {};
    const typeLabel = getTypeLabel(slide.type);
    return '<div class="preview-text">'
      + '<div class="preview-meta-info">'
      + '<div style="font-size:11px;color:var(--accent);margin-bottom:12px">[' + escH(typeLabel) + ' - メタ情報から自動生成]</div>'
      + (meta.title ? '<div style="font-size:18px;font-weight:700;margin-bottom:8px">' + escH(meta.title) + '</div>' : '')
      + (meta.subtitle ? '<div style="font-size:14px;color:var(--text2);margin-bottom:8px">' + escH(meta.subtitle) + '</div>' : '')
      + (meta.authors ? '<div style="font-size:13px">' + escH(meta.authors) + '</div>' : '')
      + (meta.affiliation ? '<div style="font-size:12px;color:var(--text2)">' + escH(meta.affiliation) + '</div>' : '')
      + '</div>'
      + '</div>';
  }

  // 通常スライド: heading + body
  const heading = slide.heading || '(見出しなし)';
  const body = slide.body || '(本文なし)';

  let imageInfo = '';
  if (slide.image) {
    imageInfo = '<div style="font-size:11px;color:var(--orange);margin-top:8px;padding:6px 10px;background:var(--surface2);border-radius:4px">'
      + '&#128444; 画像: ' + escH(slide.image)
      + (slide.image_caption ? ' - ' + escH(slide.image_caption) : '')
      + '</div>';
  }

  return '<div class="preview-text">'
    + '<div class="preview-heading">' + escH(heading) + '</div>'
    + '<div class="preview-body">' + escH(body) + '</div>'
    + imageInfo
    + '</div>';
}

// ── ノートパネル ──
function renderNotesPanel(idx, slide, time) {
  return '<div class="notes-panel">'
    + '<div class="notes-panel-header">'
    + '<span class="field-label">発表ノート</span>'
    + '<button class="btn btn-ai" onclick="copyAiDraft(' + idx + ')">&#9998; AI下書き</button>'
    + '</div>'
    + '<textarea class="notes-textarea" id="notesTextarea" placeholder="このスライドの発表ノート（台本）を入力してください..."'
    + ' data-idx="' + idx + '">' + escH(slide.notes || '') + '</textarea>'
    + '</div>';
}

// ── ノート入力ハンドラ ──
function onNotesInput(e) {
  const idx = parseInt(e.target.dataset.idx);
  if (isNaN(idx)) return;
  planData.slides[idx].notes = e.target.value;

  // ステータスバーをリアルタイム更新
  const time = calcSpeakingTime(e.target.value);
  const statusBar = document.querySelector('.status-bar');
  if (statusBar) {
    const timeDisplay = formatTimeDisplay(time);
    statusBar.innerHTML = '<div class="stat-item">文字数: <span class="stat-value">' + time.chars + '</span></div>'
      + '<div class="stat-item">読み上げ目安: <span class="stat-value ' + (time.totalSeconds > 120 ? 'time-warn' : 'time-ok') + '">' + timeDisplay + '</span></div>'
      + '<div class="stat-item" style="color:var(--text2)">(400字/分)</div>';
  }

  // サイドバーのノートインジケータ更新
  const items = document.querySelectorAll('.slide-list-item');
  if (items[idx]) {
    const dot = items[idx].querySelector('.notes-dot');
    if (dot) {
      const hasNotes = e.target.value.trim().length > 0;
      dot.className = 'notes-dot' + (hasNotes ? ' has-notes' : '');
    }
  }

  // ヘッダーの合計時間を更新
  updateTotalTime();
}

// ── 時間表示のフォーマット ──
function formatTimeDisplay(time) {
  if (time.totalSeconds === 0) return '0秒';
  if (time.minutes > 0) return '約' + time.minutes + '分' + time.seconds + '秒';
  return '約' + time.seconds + '秒';
}

// ── ヘッダーの合計時間表示更新 ──
function updateTotalTime() {
  const totalEl = document.getElementById('totalTime');
  if (!planData) { totalEl.textContent = ''; return; }
  const total = calcTotalTime();
  const notesCount = planData.slides.filter(s => s.notes && s.notes.trim().length > 0).length;
  if (total.totalSeconds === 0) {
    totalEl.textContent = 'ノート: 0/' + planData.slides.length;
  } else {
    totalEl.textContent = '合計: 約' + total.minutes + '分' + total.seconds + '秒'
      + ' (' + notesCount + '/' + planData.slides.length + ' スライド)';
  }
}

// ── AI下書きプロンプトをクリップボードにコピー ──
function copyAiDraft(idx) {
  const slide = planData.slides[idx];
  const meta = planData.meta || {};

  // プロンプトテンプレート構築
  let prompt = '以下のスライド内容に基づいて、発表用の台本（ノート）を日本語で作成してください。\n';
  prompt += '聴衆に語りかけるような自然な口調で、1〜2分程度の長さにしてください。\n\n';
  prompt += '---\n';
  prompt += 'プレゼンテーション: ' + (meta.title || '(タイトル未設定)') + '\n';
  prompt += 'スライド ' + (idx + 1) + ' / ' + planData.slides.length + '\n';
  if (slide.type) prompt += 'スライドタイプ: ' + getTypeLabel(slide.type) + '\n';
  if (slide.heading) prompt += '見出し: ' + slide.heading + '\n';
  if (slide.body) prompt += '本文:\n' + slide.body + '\n';
  if (slide.image_caption) prompt += '画像キャプション: ' + slide.image_caption + '\n';
  if (slide.table_caption) prompt += 'テーブルキャプション: ' + slide.table_caption + '\n';
  prompt += '---\n\n';
  prompt += '台本のみを出力してください（見出しや装飾は不要です）。';

  navigator.clipboard.writeText(prompt).then(() => {
    showToast('AI下書きプロンプトをクリップボードにコピーしました');
  }).catch(() => {
    // フォールバック: テキストエリアで選択
    const ta = document.createElement('textarea');
    ta.value = prompt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('AI下書きプロンプトをクリップボードにコピーしました');
  });
}

// ── トースト表示 ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── iframeスケーリング ──
function scalePreviewIframe() {
  const wrapper = document.getElementById('previewWrapper');
  const iframe = document.getElementById('previewIframe');
  if (!wrapper || !iframe) return;

  const wrapperW = wrapper.clientWidth;
  const wrapperH = wrapper.clientHeight;
  // スライドの原寸: 960x540
  const scaleX = wrapperW / 960;
  const scaleY = wrapperH / 540;
  const scale = Math.min(scaleX, scaleY);
  iframe.style.transform = 'scale(' + scale + ')';
  iframe.style.transformOrigin = 'top left';
  // スケール後の実際のサイズに合わせてwrapperの内容をセンタリング
  const scaledW = 960 * scale;
  const scaledH = 540 * scale;
  const offsetX = Math.max(0, (wrapperW - scaledW) / 2);
  const offsetY = Math.max(0, (wrapperH - scaledH) / 2);
  iframe.style.left = offsetX + 'px';
  iframe.style.top = offsetY + 'px';
}

// ウィンドウリサイズ時にiframeを再スケーリング
window.addEventListener('resize', () => {
  requestAnimationFrame(scalePreviewIframe);
});

// ── エクスポート ──
function exportJSON() {
  if (!planData) return;
  const clean = JSON.parse(JSON.stringify(planData));
  download(clean, 'slide_plan.json');
}

function download(obj, filename) {
  const json = JSON.stringify(obj, null, 2);
  const blob = new Blob([json], { type: 'application/json; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── スライド選択 ──
function selectSlide(idx) {
  // 現在のテキストエリアの値を保存（入力中のデータ消失防止）
  const textarea = document.getElementById('notesTextarea');
  if (textarea) {
    const curIdx = parseInt(textarea.dataset.idx);
    if (!isNaN(curIdx) && planData.slides[curIdx]) {
      planData.slides[curIdx].notes = textarea.value;
    }
  }
  currentSlide = idx;
  render();
}

// ── ユーティリティ ──
function getTypeLabel(t) {
  return (SLIDE_TYPES.find(x => x.value === t) || {}).label || t || '?';
}
function escH(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escA(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── キーボードナビゲーション ──
document.addEventListener('keydown', e => {
  if (!planData) return;

  // Ctrl+S: 保存
  if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    exportJSON();
    return;
  }

  // テキストエリアやその他の入力要素にフォーカスがある場合は矢印キーを無視
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentSlide > 0) { selectSlide(currentSlide - 1); }
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentSlide < planData.slides.length - 1) { selectSlide(currentSlide + 1); }
  }
});
</script>
